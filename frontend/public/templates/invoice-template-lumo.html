<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice ${{invoice_number}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: #1a1a1a;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .shell {
      max-width: 680px;
      margin: 0 auto;
      padding: 72px 56px 96px;
    }
    .top-rule {
      height: 1px;
      background: #e8e8e8;
      margin-bottom: 56px;
    }
    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 32px;
      margin-bottom: 72px;
    }
    .masthead .logo-section img {
      max-width: 140px;
      max-height: 72px;
      object-fit: contain;
    }
    .masthead .title-block {
      text-align: right;
    }
    .masthead .title-block .kicker {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 10px;
    }
    .masthead .title-block h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 42px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.02em;
      color: #111;
    }
    .masthead .title-block .num {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
      font-weight: 500;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px 32px;
      margin-bottom: 64px;
    }
    .meta h2 {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #a3a3a3;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .meta .value {
      color: #262626;
      font-weight: 500;
    }
    .meta .address {
      color: #525252;
      white-space: pre-line;
      font-weight: 400;
    }
    .items-slot {
      margin-bottom: 56px;
    }
    .items-slot table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .totals-wrap {
      display: flex;
      justify-content: flex-end;
    }
    .totals-table {
      width: 100%;
      max-width: 320px;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .totals-row .label {
      color: #737373;
      font-size: 14px;
    }
    .totals-row .value {
      font-weight: 500;
      color: #171717;
    }
    .totals-row.total {
      border-bottom: none;
      margin-top: 8px;
      padding-top: 22px;
      border-top: 1px solid #1a1a1a;
    }
    .totals-row.total .label,
    .totals-row.total .value {
      font-size: 17px;
      font-weight: 600;
      color: #0a0a0a;
    }
    footer {
      margin-top: 80px;
      padding-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #a8a8a8;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top-rule" aria-hidden="true"></div>
    <header class="masthead">
      <div class="logo-section">${{logo}}</div>
      <div class="title-block">
        <p class="kicker">Tagihan</p>
        <h1>Invoice</h1>
        <p class="num">#${{invoice_number}}</p>
      </div>
    </header>

    <section class="meta">
      <div>
        <h2>Tanggal</h2>
        <p class="value">${{invoice_date}}</p>
      </div>
      <div>
        <h2>Ke</h2>
        <p class="value" style="margin-bottom:6px;">${{customer_name}}</p>
        <p class="address">${{customer_address}}</p>
      </div>
    </section>

    <div class="items-slot">${{items}}</div>

    <div class="totals-wrap">
      <div class="totals-table">
        <div class="totals-row">
          <span class="label">Subtotal</span>
          <span class="value">${{subtotal}}</span>
        </div>
        ${{tax_row}}
        <div class="totals-row total">
          <span class="label">Total</span>
          <span class="value">${{total}}</span>
        </div>
      </div>
    </div>

    <footer>Terima kasih atas kepercayaan Anda</footer>
  </div>
</body>
</html>
