<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice ${{invoice_number}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Syne", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: #111;
      background: #f2f2f2;
      -webkit-font-smoothing: antialiased;
    }
    .shell {
      max-width: 740px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .doc {
      background: #fff;
      border: 3px solid #111;
      border-radius: 0;
      overflow: hidden;
    }
    .ribbon {
      background: #111;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .ribbon .logo-section img {
      max-width: 110px;
      max-height: 52px;
      object-fit: contain;
    }
    .ribbon .tag {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .ribbon .id {
      font-family: "Space Mono", monospace;
      font-size: 16px;
      font-weight: 700;
    }
    .body {
      padding: 32px 28px 40px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .box {
      border: 2px solid #111;
      padding: 16px 18px;
    }
    .box h3 {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.65;
    }
    .box .big { font-weight: 700; font-size: 15px; }
    .box .addr {
      margin-top: 6px;
      font-size: 13px;
      white-space: pre-line;
      opacity: 0.85;
    }
    .items-slot { margin-bottom: 28px; }
    .items-slot table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sum {
      border: 2px solid #111;
      padding: 20px 22px;
      max-width: 340px;
      margin-left: auto;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #111;
    }
    .totals-row:last-of-type { border-bottom: none; }
    .totals-row .label {
      font-family: "Space Mono", monospace;
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .totals-row .value { font-weight: 700; }
    .totals-row.total {
      margin-top: 12px;
      padding-top: 16px;
      border-top: 3px solid #111;
      border-bottom: none;
    }
    .totals-row.total .label { font-size: 13px; opacity: 1; font-weight: 700; }
    .totals-row.total .value { font-size: 18px; }
    footer {
      margin-top: 28px;
      text-align: center;
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="doc">
      <div class="ribbon">
        <div class="logo-section">${{logo}}</div>
        <div style="text-align:right;">
          <p class="tag">Invoice</p>
          <p class="id">${{invoice_number}}</p>
        </div>
      </div>
      <div class="body">
        <div class="row">
          <div class="box">
            <h3>Tanggal</h3>
            <p class="big">${{invoice_date}}</p>
          </div>
          <div class="box">
            <h3>Pelanggan</h3>
            <p class="big">${{customer_name}}</p>
            <p class="addr">${{customer_address}}</p>
          </div>
        </div>
        <div class="items-slot">${{items}}</div>
        <div class="sum">
          <div class="totals-row">
            <span class="label">Subtotal</span>
            <span class="value">${{subtotal}}</span>
          </div>
          ${{tax_row}}
          <div class="totals-row total">
            <span class="label">Total</span>
            <span class="value">${{total}}</span>
          </div>
        </div>
      </div>
    </div>
    <footer>Terima kasih atas kepercayaan Anda</footer>
  </div>
</body>
</html>
