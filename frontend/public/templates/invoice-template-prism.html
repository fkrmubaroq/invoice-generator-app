<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice ${{invoice_number}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Outfit", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #312e81;
      background: linear-gradient(160deg, #eef2ff 0%, #faf5ff 50%, #f8fafc 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 22px 80px;
    }
    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(99, 102, 241, 0.18);
      box-shadow:
        0 1px 2px rgba(79, 70, 229, 0.06),
        0 16px 48px rgba(79, 70, 229, 0.12);
      overflow: hidden;
    }
    .prism {
      height: 5px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #a855f7, #6366f1);
      background-size: 200% 100%;
    }
    .pad { padding: 40px 36px 44px; }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 36px;
    }
    .head .logo-section img {
      max-width: 124px;
      max-height: 62px;
      object-fit: contain;
    }
    .head .bx { text-align: right; }
    .head .bx .lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 6px;
    }
    .head .bx .no {
      font-family: "Libre Baskerville", Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: #1e1b4b;
    }
    .head .bx .date { margin-top: 8px; font-size: 13px; color: #6366f1; font-weight: 500; }
    .bill {
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 36px;
      background: rgba(238, 242, 255, 0.65);
      border: 1px solid rgba(99, 102, 241, 0.15);
    }
    .bill h2 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #7c3aed;
      margin-bottom: 10px;
    }
    .bill .name { font-weight: 700; font-size: 16px; color: #1e1b4b; margin-bottom: 6px; }
    .bill .addr { color: #4c1d95; white-space: pre-line; font-size: 13px; opacity: 0.92; }
    .items-slot { margin-bottom: 36px; }
    .items-slot table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .totals-outer { display: flex; justify-content: flex-end; }
    .tot-table { width: 296px; }
    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid rgba(99, 102, 241, 0.12);
    }
    .totals-row .label { color: #6366f1; font-size: 13px; font-weight: 500; }
    .totals-row .value { font-weight: 600; color: #3730a3; }
    .totals-row.total {
      border-bottom: none;
      margin-top: 8px;
      padding-top: 18px;
      border-top: 2px solid #6366f1;
    }
    .totals-row.total .label { font-size: 14px; font-weight: 700; color: #312e81; }
    .totals-row.total .value { font-size: 18px; font-weight: 700; color: #1e1b4b; }
    footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #6366f1;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glass">
      <div class="prism" aria-hidden="true"></div>
      <div class="pad">
        <header class="head">
          <div class="logo-section">${{logo}}</div>
          <div class="bx">
            <p class="lbl">Invoice</p>
            <p class="no">${{invoice_number}}</p>
            <p class="date">${{invoice_date}}</p>
          </div>
        </header>
        <div class="bill">
          <h2>Ditagihkan kepada</h2>
          <p class="name">${{customer_name}}</p>
          <p class="addr">${{customer_address}}</p>
        </div>
        <div class="items-slot">${{items}}</div>
        <div class="totals-outer">
          <div class="tot-table">
            <div class="totals-row">
              <span class="label">Subtotal</span>
              <span class="value">${{subtotal}}</span>
            </div>
            ${{tax_row}}
            <div class="totals-row total">
              <span class="label">Total</span>
              <span class="value">${{total}}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer>Terima kasih atas kepercayaan Anda</footer>
  </div>
</body>
</html>
