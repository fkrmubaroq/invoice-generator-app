<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice ${{invoice_number}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Figtree", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #3f3a45;
      background: linear-gradient(165deg, #fff8f8 0%, #ffffff 45%, #faf5ff 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 28px 72px;
    }
    .card {
      background: rgba(255,255,255,0.88);
      border-radius: 24px;
      padding: 44px 40px 48px;
      border: 1px solid rgba(236, 72, 153, 0.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.8) inset,
        0 24px 48px rgba(190, 100, 140, 0.08);
    }
    .bloom {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #f472b6, #c084fc, #fb7185);
      margin-bottom: 36px;
      opacity: 0.9;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 36px;
    }
    .head .logo-section img {
      max-width: 120px;
      max-height: 60px;
      object-fit: contain;
    }
    .head .meta h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: 32px;
      font-weight: 600;
      font-style: italic;
      color: #4c1d4d;
      letter-spacing: -0.02em;
    }
    .head .meta .no {
      margin-top: 6px;
      font-weight: 600;
      color: #86198f;
      font-size: 14px;
    }
    .head .meta .date {
      margin-top: 4px;
      color: #a21caf;
      font-size: 13px;
      opacity: 0.85;
    }
    .who {
      background: linear-gradient(135deg, rgba(253, 242, 248, 0.9), rgba(250, 245, 255, 0.95));
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 36px;
      border: 1px solid rgba(236, 72, 153, 0.08);
    }
    .who h2 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c026d3;
      margin-bottom: 10px;
      opacity: 0.85;
    }
    .who .name { font-weight: 600; font-size: 16px; color: #4a044e; margin-bottom: 6px; }
    .who .addr { color: #86198f; white-space: pre-line; font-size: 13px; opacity: 0.9; }
    .items-slot { margin-bottom: 36px; }
    .items-slot table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tot {
      display: flex;
      justify-content: flex-end;
    }
    .tot-table { width: 292px; }
    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid rgba(192, 38, 211, 0.12);
    }
    .totals-row .label { color: #9333ea; font-size: 13px; opacity: 0.85; }
    .totals-row .value { font-weight: 600; color: #581c87; }
    .totals-row.total {
      border-bottom: none;
      margin-top: 8px;
      padding-top: 18px;
      border-top: 2px solid #c026d3;
    }
    .totals-row.total .label { font-size: 14px; font-weight: 700; color: #6b21a8; }
    .totals-row.total .value { font-size: 17px; font-weight: 700; color: #4c1d95; }
    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: #a855f7;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="bloom" aria-hidden="true"></div>
      <header class="head">
        <div class="logo-section">${{logo}}</div>
        <div class="meta">
          <h1>Invoice</h1>
          <p class="no">${{invoice_number}}</p>
          <p class="date">${{invoice_date}}</p>
        </div>
      </header>
      <div class="who">
        <h2>Ditagihkan kepada</h2>
        <p class="name">${{customer_name}}</p>
        <p class="addr">${{customer_address}}</p>
      </div>
      <div class="items-slot">${{items}}</div>
      <div class="tot">
        <div class="tot-table">
          <div class="totals-row">
            <span class="label">Subtotal</span>
            <span class="value">${{subtotal}}</span>
          </div>
          ${{tax_row}}
          <div class="totals-row total">
            <span class="label">Total</span>
            <span class="value">${{total}}</span>
          </div>
        </div>
      </div>
    </div>
    <footer>Terima kasih atas kepercayaan Anda</footer>
  </div>
</body>
</html>
